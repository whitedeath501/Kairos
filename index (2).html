<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JobMatch - Conectando Talentos</title>
  <style>
    :root {
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --bg: #f8fafc;
      --card-bg: #ffffff;
      --text-main: #1e293b;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --success: #10b981;
      --danger: #ef4444;
      --radius: 12px;
      --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
      --ring: 0 0 3px rgb(37 99 235 / 0.2);
    }

    body.acessibilidade {
      --bg: #000000;
      --card-bg: #1a1a1a;
      --text-main: #ffffff;
      --text-muted: #e5e5e5;
      --border: #ffffff;
      --primary: #ffff00;
      --primary-hover: #f0f000;
    }
    body.acessibilidade * { font-size: 1.2rem!important; }
    body.acessibilidade h1 { font-size: 2.2rem!important; }
    body.acessibilidade button { border: 2px solid var(--primary)!important; }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }
    body { background: var(--bg); color: var(--text-main); line-height: 1.5; transition: background 0.3s; }
    .container { max-width: 1000px; margin: 0 auto; padding: 2rem; }
    .hidden { display: none!important; }
    .card { background: var(--card-bg); border-radius: var(--radius); box-shadow: var(--shadow); padding: 2rem; margin-bottom: 1.5rem; border: 1px solid var(--border); }
    .flex { display: flex; }
    .between { justify-content: space-between; }
    .items-center { align-items: center; }
    .gap-2 { gap: 0.5rem; }
    .gap-4 { gap: 1rem; }
    .mb-4 { margin-bottom: 1rem; }
    .mt-4 { margin-top: 1rem; }
    .w-full { width: 100%; }
    .text-center { text-align: center; }
    
    h1 { font-size: 1.875rem; font-weight: 700; }
    h2 { font-size: 1.25rem; font-weight: 700; }
    .subtitle { color: var(--text-muted); margin-bottom: 2rem; }

    .tabs { display: flex; gap: 1rem; margin-bottom: 2rem; border-bottom: 1px solid var(--border); overflow-x: auto; }
    .tab { padding: 0.75rem 1rem; cursor: pointer; font-weight: 600; color: var(--text-muted); border-bottom: 2px solid transparent; white-space: nowrap; }
    .tab.active { color: var(--primary); border-bottom-color: var(--primary); }

    button {
      padding: 0.6rem 1.2rem; border-radius: var(--radius); border: none;
      font-weight: 600; cursor: pointer; transition: all 0.2s;
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover:not(:disabled) { background: var(--primary-hover); transform: translateY(-1px); }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-main); }
    .btn-outline:hover:not(:disabled) { background: var(--bg); }
    .btn-danger { background: #fee2e2; color: var(--danger); }
    .btn-link { background: none; border: none; color: var(--primary); padding: 0; font-weight: 600; cursor: pointer; }
    .btn-link:hover { text-decoration: underline; }

    .input-group { margin-bottom: 1.25rem; }
    label { display: block; font-size: 0.875rem; font-weight: 600; margin-bottom: 0.4rem; }
    input, textarea, select {
      width: 100%; padding: 0.75rem; border: 1px solid var(--border);
      border-radius: var(--radius); background: var(--card-bg); color: var(--text-main);
    }
    
    .vaga-card { border: 1px solid var(--border); padding: 1.5rem; border-radius: var(--radius); margin-bottom: 1rem; transition: 0.2s; }
    .vaga-card:hover { border-color: var(--primary); }
    .tag { background: var(--border); padding: 2px 10px; border-radius: 99px; font-size: 0.75rem; font-weight: 600; }
    .badge { background: var(--danger); color: white; padding: 2px 8px; border-radius: 99px; font-size: 0.7rem; margin-left: 4px; }

    .chat-container { display: flex; height: 500px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--card-bg); overflow: hidden;}
    .chat-list { width: 250px; border-right: 1px solid var(--border); overflow-y: auto; background: var(--bg); }
    .chat-item { padding: 1rem; border-bottom: 1px solid var(--border); cursor: pointer; }
    .chat-item.active { background: var(--card-bg); border-left: 4px solid var(--primary); }
    .chat-box { flex: 1; display: flex; flex-direction: column; }
    .chat-messages { flex: 1; padding: 1.5rem; overflow-y: auto; display: flex; flex-direction: column; gap: 1rem; }
    .chat-msg { padding: 0.75rem 1rem; border-radius: 12px; max-width: 80%; }
    .chat-msg.me { background: var(--primary); color: white; align-self: flex-end; }
    .chat-msg.other { background: var(--border); align-self: flex-start; }
    .chat-input { display: flex; gap: 0.5rem; padding: 1rem; border-top: 1px solid var(--border); }

    .notif-item { 
      padding: 1rem; border: 1px solid var(--border); border-radius: var(--radius); 
      margin-bottom: 0.75rem; display: flex; justify-content: space-between; align-items: flex-start;
      cursor: pointer; transition: 0.2s;
    }
    .notif-item:hover { background: var(--bg); }
    .notif-item.unread { border-left: 4px solid var(--primary); background: #f0f7ff; }

    .toast {
      position: fixed; bottom: 20px; right: 20px; background: var(--text-main); color: var(--bg);
      padding: 12px 20px; border-radius: var(--radius); opacity: 0; transition: 0.3s; z-index: 1000;
    }
    .toast.show { opacity: 1; transform: translateY(-10px); }
    .modal-backdrop { position: fixed; inset: 0; background: rgb(0 0 0 / 0.5); display: grid; place-items: center; z-index: 2000; }

    /* Estilos Adicionais para Perfil Melhorado */
    .profile-header { background: linear-gradient(135deg, var(--primary), var(--primary-hover)); height: 120px; border-radius: var(--radius) var(--radius) 0 0; margin: -2rem -2rem 3rem -2rem; position: relative; }
    .profile-avatar-container { position: absolute; bottom: -40px; left: 2rem; }
    .profile-avatar { width: 100px; height: 100px; border-radius: 50%; border: 4px solid var(--card-bg); object-fit: cover; box-shadow: var(--shadow); background: var(--card-bg); }
    .profile-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    @media (max-width: 600px) { .profile-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<div class="container">
  <div id="login-area" class="card" style="max-width: 480px; margin: 4rem auto;">
    <h1 id="auth-title">Entrar</h1>
    <p class="subtitle" id="auth-subtitle">Conectando talentos e empresas.</p>
    <div class="tabs">
      <div class="tab active" onclick="switchAuthTab('candidato')">Candidato</div>
      <div class="tab" onclick="switchAuthTab('empresa')">Empresa</div>
    </div>
    <form onsubmit="handleAuth(event)">
      <div id="nome-group" class="input-group hidden">
        <label id="label-nome">Nome completo</label>
        <input type="text" id="auth-nome" placeholder="Seu nome">
      </div>
      <div class="input-group">
        <label id="label-email">Email pessoal</label>
        <input type="email" id="auth-email" required>
      </div>
      <div class="input-group">
        <label>Senha</label>
        <input type="password" id="auth-password" required minlength="6">
      </div>
      <div id="confirm-group" class="input-group hidden">
        <label>Confirmar senha</label>
        <input type="password" id="auth-confirm">
      </div>
      <button type="submit" class="btn-primary w-full" id="auth-button">Entrar</button>
      
      <button type="button" class="btn-outline w-full mt-4" id="btn-toggle-voz" onclick="toggleVoz()">🔇 Ativar Narrador</button>
      
      <p class="text-center mt-4">
        <span id="auth-link-text">Não tem conta?</span>
        <button type="button" class="btn-link" id="auth-link-action" onclick="toggleAuthMode()">Crie uma</button>
      </p>
    </form>
  </div>

  <div id="dashboard" class="hidden">
    <div class="header flex between items-center mb-4">
      <div>
        <h1 id="dash-title">Painel</h1>
        <p class="subtitle" id="dash-user-info" style="margin-bottom:0"></p>
      </div>
      <div class="flex gap-2">
        <button class="btn-primary hidden" id="btn-criar-vaga" onclick="abrirModalVaga()">+ Criar Vaga</button>
        <button class="btn-outline" onclick="lerConteudoPagina()" title="Leitor de Tela">🔊 Ler Tela</button>
        <button class="btn-outline" onclick="toggleAcessibilidade()" title="Alto Contraste">♿</button>
        <button class="btn-danger" onclick="confirmLogout()">Sair</button>
      </div>
    </div>
    <div class="tabs" id="main-nav"></div>
    <main id="dash-content"></main>
  </div>
</div>

<div id="modal-vaga" class="modal-backdrop hidden">
  <div class="card" style="max-width: 500px; width: 90%;">
    <h2>Nova Vaga</h2>
    <form onsubmit="salvarVaga(event)">
      <div class="input-group mt-4">
        <label>Título</label>
        <input type="text" id="vaga-titulo" required>
      </div>
      <div class="input-group">
        <label>Local</label>
        <select id="vaga-local"></select>
      </div>
      <div class="input-group">
        <label>Descrição</label>
        <textarea id="vaga-desc" rows="3" required></textarea>
      </div>
      <div class="flex gap-2">
        <button type="button" class="btn-outline w-full" onclick="fecharModal()">Cancelar</button>
        <button type="submit" class="btn-primary w-full">Publicar</button>
      </div>
    </form>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
  const state = {
    user: JSON.parse(localStorage.getItem('user')),
    view: 'vagas',
    authMode: 'candidato',
    isRegister: false,
    chatAtual: null,
    vozAtiva: false,
    db: {
      vagas: JSON.parse(localStorage.getItem('db_vagas')) || [
        { id: 1, titulo: 'Dev React', empresa: 'Tech Corp', empresaEmail: 'rh@tech.com', local: 'Remoto', tipo: 'CLT', desc: 'Vaga para front-end.' }
      ],
      perfis: JSON.parse(localStorage.getItem('db_perfis')) || {},
      chats: JSON.parse(localStorage.getItem('db_chats')) || [],
      mensagens: JSON.parse(localStorage.getItem('db_mensagens')) || [],
      notificacoes: JSON.parse(localStorage.getItem('db_notificacoes')) || [
        { id: 1, user: null, titulo: 'Bem-vindo ao JobMatch!', desc: 'Complete seu perfil para começar.', lida: false, data: 'agora' }
      ]
    }
  };

  const REGIOES = ['Remoto', 'São Paulo - SP', 'Rio de Janeiro - RJ', 'Curitiba - PR'];
  const $ = id => document.getElementById(id);
  const save = (k, v) => localStorage.setItem(k, JSON.stringify(v));

  window.onload = () => {
    popularRegioes();
    if (state.user) showDashboard();
  };

  function toggleVoz() {
    state.vozAtiva = !state.vozAtiva;
    const btn = $('btn-toggle-voz');
    if(state.vozAtiva) {
      btn.innerText = "🔊 Narrador Ativo";
      lerTexto("Narrador de voz ativado.");
    } else {
      btn.innerText = "🔇 Ativar Narrador";
      window.speechSynthesis.cancel();
    }
  }

  function lerTexto(texto) {
    if (!state.vozAtiva) return;
    if ('speechSynthesis' in window) {
      window.speechSynthesis.cancel();
      const msg = new SpeechSynthesisUtterance(texto);
      msg.lang = 'pt-BR';
      msg.rate = 1.1;
      window.speechSynthesis.speak(msg);
    } else {
      toast("Seu navegador não suporta leitura de voz.");
    }
  }

  function lerConteudoPagina() {
    const originalState = state.vozAtiva;
    state.vozAtiva = true; 
    const conteudo = $('dash-content').innerText;
    lerTexto("Lendo conteúdo atual: " + conteudo);
    state.vozAtiva = originalState;
  }

  function toast(m) {
    const t = $('toast');
    t.textContent = m;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  function popularRegioes() {
    const s = $('vaga-local');
    if(s) {
      s.innerHTML = '';
      REGIOES.forEach(item => s.innerHTML += `<option value="${item}">${item}</option>`);
    }
  }

  function switchAuthTab(m) {
    state.authMode = m;
    document.querySelectorAll('#login-area .tab').forEach(t => t.classList.toggle('active', t.innerText.toLowerCase() === m));
    const isEmpresa = m === 'empresa';
    $('label-email').innerText = isEmpresa? 'Email corporativo' : 'Email pessoal';
    $('label-nome').innerText = isEmpresa? 'Nome da empresa' : 'Nome completo';
    lerTexto("Alterado para modo " + m);
  }

  function toggleAuthMode() {
    state.isRegister = !state.isRegister;
    
    // Atualiza visibilidade dos campos extras
    $('nome-group').classList.toggle('hidden', !state.isRegister);
    $('confirm-group').classList.toggle('hidden', !state.isRegister);

    // Atualiza textos da interface
    const linkTexto = $("auth-link-text");
    const linkAcao = $("auth-link-action");
    const titulo = $("auth-title");
    const botao = $("auth-button");

    if (state.isRegister) {
      titulo.innerText = "Criar Conta";
      botao.innerText = "Criar Conta";
      linkTexto.innerText = "Já tem uma conta?";
      linkAcao.innerText = "Faça login";
      lerTexto("Mudado para criação de conta");
    } else {
      titulo.innerText = "Entrar";
      botao.innerText = "Entrar";
      linkTexto.innerText = "Não tem conta?";
      linkAcao.innerText = "Crie uma";
      lerTexto("Mudado para login");
    }
  }

  function handleAuth(e) {
    e.preventDefault();
    const email = $('auth-email').value;

    if (state.isRegister) {
      toast("Conta criada com sucesso!");
      lerTexto("Conta criada com sucesso.");
    } else {
      lerTexto("Login realizado com sucesso.");
    }

    state.user = { email, type: state.authMode };
    save('user', state.user);
    
    // Notificação inicial se for novo
    const notifExiste = state.db.notificacoes.find(n => n.user === email);
    if (!notifExiste) {
      state.db.notificacoes.push({
        id: Date.now(),
        user: email,
        titulo: 'Perfil Incompleto',
        desc: 'Adicione uma foto e descrição no seu perfil para atrair mais oportunidades.',
        lida: false,
        data: 'agora'
      });
      save('db_notificacoes', state.db.notificacoes);
    }
    
    showDashboard();
  }

  function showDashboard() {
    $('login-area').classList.add('hidden');
    $('dashboard').classList.remove('hidden');
    $('dash-user-info').innerText = `Logado como: ${state.user.email}`;
    $('btn-criar-vaga').classList.toggle('hidden', state.user.type !== 'empresa');
    renderNav();
    renderContent('vagas');
  }

  function confirmLogout() {
    lerTexto("Saindo do sistema.");
    localStorage.removeItem('user');
    location.reload();
  }

  function renderNav() {
    const naoLidas = state.db.notificacoes.filter(n => (n.user === state.user.email || n.user === null) && !n.lida).length;
    const items = ['vagas', 'chats', 'notificacoes', 'perfil'];
    $('main-nav').innerHTML = items.map(i => `
      <div class="tab ${state.view === i ? 'active' : ''}" onclick="renderContent('${i}')">
        ${i.toUpperCase()} ${i === 'notificacoes' && naoLidas > 0 ? `<span class="badge">${naoLidas}</span>` : ''}
      </div>
    `).join('');
  }

  function renderContent(view) {
    state.view = view;
    renderNav();
    const container = $('dash-content');
    const isEmpresa = state.user.type === 'empresa';

    if (view === 'vagas') {
      const list = isEmpresa ? state.db.vagas.filter(v => v.empresaEmail === state.user.email) : state.db.vagas;
      container.innerHTML = `
        <div class="card">
          <div class="flex between items-center mb-4">
            <h2>Vagas ${isEmpresa ? 'Publicadas' : 'Disponíveis'}</h2>
            ${isEmpresa ? '<button class="btn-primary" onclick="abrirModalVaga()">+ Nova Vaga</button>' : ''}
          </div>
          ${list.map(v => `
            <div class="vaga-card">
              <div class="flex between"><strong>${v.titulo}</strong> <span class="tag">${v.tipo}</span></div>
              <p>${v.empresa} - ${v.local}</p>
              <div class="flex gap-2 mt-4">
                ${!isEmpresa ? `<button class="btn-primary" onclick="this.innerText='✓ Candidatado'; this.disabled=true; toast('Candidatura enviada!'); lerTexto('Candidatura enviada para ' + '${v.titulo}')">Candidatar</button>` : ''}
                <button class="btn-outline" onclick="iniciarChat('${v.empresaEmail}')">Chat</button>
              </div>
            </div>
          `).join('')}
        </div>
      `;
    } 
    else if (view === 'perfil') {
      const p = state.db.perfis[state.user.email] || {};
      container.innerHTML = `
        <div class="card">
          <div class="profile-header">
            <div class="profile-avatar-container">
               <img src="${p.foto || 'https://ui-avatars.com/api/?background=random&name='+state.user.email}" id="p-preview" class="profile-avatar">
            </div>
          </div>
          
          <div style="margin-bottom: 2rem;">
            <h2 style="font-size: 1.5rem;">Configurações do Perfil</h2>
            <p class="subtitle" style="margin-bottom:0">Gerencie suas informações públicas e de contato.</p>
          </div>

          <div class="profile-grid">
            <div class="input-group">
              <label>Nome de Exibição</label>
              <input type="text" id="p-nome" value="${p.nome || ''}" placeholder="Como deseja ser chamado?">
            </div>
            <div class="input-group">
              <label>URL da Foto de Perfil</label>
              <input type="text" id="p-foto" value="${p.foto || ''}" placeholder="Link da imagem (ex: imgur)" oninput="$('p-preview').src=this.value">
            </div>
          </div>

          <div class="input-group">
            <label>${isEmpresa ? 'Descrição da Empresa' : 'Biografia Profissional'}</label>
            <textarea id="p-sobre" rows="5" placeholder="${isEmpresa ? 'Fale sobre a cultura e valores da sua empresa...' : 'Conte sua trajetória, habilidades e o que você busca...'}" style="resize: vertical;">${p.sobre || ''}</textarea>
          </div>

          <div class="flex gap-2 mt-4" style="border-top: 1px solid var(--border); padding-top: 1.5rem;">
            <button class="btn-primary" onclick="salvarPerfil()">
               <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
               Salvar Alterações
            </button>
            <button class="btn-outline" onclick="renderContent('vagas')">Cancelar</button>
          </div>
        </div>
      `;
    }
    else if (view === 'chats') {
      renderChats();
    }
    else if (view === 'notificacoes') {
      renderNotificacoes();
    }
    lerTexto("Visualizando " + view);
  }

  function salvarPerfil() {
    state.db.perfis[state.user.email] = {
      nome: $('p-nome').value,
      foto: $('p-foto').value,
      sobre: $('p-sobre').value
    };
    save('db_perfis', state.db.perfis);
    toast('Perfil salvo com sucesso!');
    lerTexto("As alterações do seu perfil foram salvas.");
  }

  function renderChats() {
    const meus = state.db.chats.filter(c => c.participantes.includes(state.user.email));
    $('dash-content').innerHTML = `
      <div class="chat-container">
        <div class="chat-list">${meus.map(c => {
          const outro = c.participantes.find(p=>p!==state.user.email);
          return `<div class="chat-item ${state.chatAtual===c.id?'active':''}" onclick="abrirChat(${c.id})">${outro}</div>`;
        }).join('')}</div>
        <div class="chat-box" id="chat-box-area">${state.chatAtual ? renderChatBox() : '<p style="margin:auto">Selecione uma conversa</p>'}</div>
      </div>
    `;
  }

  function renderChatBox() {
    const msgs = state.db.mensagens.filter(m => m.chatId === state.chatAtual);
    return `
      <div class="chat-messages" id="chat-msgs">${msgs.map(m => `<div class="chat-msg ${m.de===state.user.email?'me':'other'}">${m.texto}</div>`).join('')}</div>
      <div class="chat-input">
        <input type="text" id="msg-input" placeholder="Mensagem..." onkeypress="if(event.key==='Enter')enviarMsg()">
        <button class="btn-primary" onclick="enviarMsg()">Enviar</button>
      </div>
    `;
  }

  function abrirChat(id) { state.chatAtual = id; renderChats(); lerTexto("Chat aberto."); }
  
  function iniciarChat(outro) {
    let c = state.db.chats.find(chat => chat.participantes.includes(state.user.email) && chat.participantes.includes(outro));
    if(!c) {
      c = { id: Date.now(), participantes: [state.user.email, outro] };
      state.db.chats.push(c);
      save('db_chats', state.db.chats);
    }
    state.chatAtual = c.id;
    renderContent('chats');
  }

  function enviarMsg() {
    const txt = $('msg-input').value;
    if(!txt) return;
    state.db.mensagens.push({ chatId: state.chatAtual, de: state.user.email, texto: txt });
    save('db_mensagens', state.db.mensagens);
    renderChats();
    const b = $('chat-msgs'); if(b) b.scrollTop = b.scrollHeight;
    lerTexto("Mensagem enviada.");
  }

  function renderNotificacoes() {
    const minhas = state.db.notificacoes.filter(n => n.user === state.user.email || n.user === null);
    $('dash-content').innerHTML = `
      <div class="card">
        <h2>Notificações</h2>
        <div class="mt-4">
          ${minhas.length ? minhas.map(n => `
            <div class="notif-item ${!n.lida ? 'unread' : ''}" onclick="marcarComoLida(${n.id})">
              <div>
                <strong>${n.titulo}</strong>
                <p style="font-size: 0.9rem; color: var(--text-muted); margin-top: 0.25rem;">${n.desc}</p>
              </div>
              <span style="font-size: 0.8rem; color: var(--text-muted); white-space: nowrap;">${n.data}</span>
            </div>
          `).join('') : '<p style="color:var(--text-muted)">Nenhuma notificação ainda.</p>'}
        </div>
      </div>
    `;
  }

  function marcarComoLida(id) {
    const notif = state.db.notificacoes.find(n => n.id === id);
    if (notif && !notif.lida) {
      notif.lida = true;
      save('db_notificacoes', state.db.notificacoes);
      renderContent('notificacoes');
    }
  }

  function abrirModalVaga() { $('modal-vaga').classList.remove('hidden'); lerTexto("Modal de nova vaga aberto."); }
  function fecharModal() { $('modal-vaga').classList.add('hidden'); }
  
  function salvarVaga(e) {
    e.preventDefault();
    state.db.vagas.push({ 
      id: Date.now(), 
      titulo: $('vaga-titulo').value, 
      empresaEmail: state.user.email, 
      empresa: 'Minha Empresa',
      local: $('vaga-local').value, 
      tipo: 'CLT',
      desc: $('vaga-desc').value
    });
    save('db_vagas', state.db.vagas);
    fecharModal();
    toast("Vaga publicada!");
    lerTexto("Sua vaga foi publicada com sucesso.");
    renderContent('vagas');
  }

  function toggleAcessibilidade() { 
    document.body.classList.toggle('acessibilidade'); 
    const ativo = document.body.classList.contains('acessibilidade');
    lerTexto(ativo ? "Alto contraste ativado" : "Alto contraste desativado");
  }
</script>
</body>
</html>
